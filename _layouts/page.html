---
layout: default
---

<div class="container">
  <div class="page-head">

    <div class="page-info">
      <h1 class="page-title">{{ page.title | escape }}</h1>
      {% if page.description %}
      <p class="page-description">{{ page.description }}</p>
      {% endif %}
    </div>

    {% if page.image %}
    <div class="page-image">
      <img src="{{site.baseurl}}{{page.image}}" alt="{{page.title}}">
    </div>
    {% if page.image_caption %}
    <div class="page-image-caption">{{ page.image_caption | markdownify | replace: '<p>' | replace: '</p>' }}</div>
    {% endif %}
    {% endif %}

  </div>
</div>

<!-- begin page -->
<div class="{% if page.wide %}container-big{% else %}container{% endif %}">
  <article class="page{% if page.wide %} page--wide{% endif %}">
    <div class="page__content">
      {{ content }}
    </div>
  </article>
</div>
<!-- end page -->
